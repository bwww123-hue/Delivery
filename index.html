// ── CSV 다운로드 ────────────────────────────────────────────────────────────
function downloadCSV(content, filename) {
  const blob = new Blob(["\uFEFF"+content], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

// ── Barcode ────────────────────────────────────────────────────────────────
function Barcode({ value="SAMPLE", h=50, showText=true }) {
  const bars=[]; let x=5;
  for(let i=0;i<value.length;i++){
    const code=value.charCodeAt(i);
    for(let b=7;b>=0;b--){
      const wide=(code>>b)&1;
      if(wide||i%2===0) bars.push(<rect key={`${i}${b}`} x={x} y={2} width={wide?2.6:0.9} height={h-(showText?15:4)} fill="#111"/>);
      x+=(wide?2.6:1.2)+0.4;
    }
    x+=2;
  }
  const tw=x+5;
  return (
    <svg width={tw} height={h} style={{background:"#fff",display:"block",borderRadius:2}}>
      <rect width={tw} height={h} fill="#fff"/>
      {bars}
      {showText&&<text x={tw/2} y={h-3} textAnchor="middle" fontSize="7" fontFamily="monospace" fill="#333">{value}</text>}
    </svg>
  );
}

// ── StatusCell ─────────────────────────────────────────────────────────────
function StatusCell({ delivery, updateDelivery }) {
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    if(!open) return;
    const close=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",close);
    return()=>document.removeEventListener("mousedown",close);
  },[open]);
  const OPTIONS=[
    {key:"pending",    label:"대기중", emoji:"🕐", color:C.accent},
    {key:"inprogress", label:"배송중", emoji:"🚚", color:C.blue},
    {key:"completed",  label:"완료",   emoji:"✅", color:C.green},
  ];
  const cur=OPTIONS.find(o=>o.key===delivery.status)||OPTIONS[0];
  return (
    <div ref={ref} style={{position:"relative",display:"inline-block"}}>
      <button onClick={()=>setOpen(p=>!p)} style={{background:cur.color+"22",color:cur.color,padding:"6px 12px 6px 10px",borderRadius:20,fontSize:"0.85em",fontWeight:700,border:`1px solid ${cur.color}55`,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
        <span>{cur.emoji}</span>{cur.label}<IcChevD s={11}/>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 5px)",left:0,background:C.card2,border:`1px solid ${C.border2}`,borderRadius:10,padding:5,zIndex:100,minWidth:130,boxShadow:"0 10px 30px rgba(0,0,0,0.5)"}}>

// ── CalendarSidebar ────────────────────────────────────────────────────────
function CalendarSidebar({ selectedDate, onSelect, deliveries }) {
  const [view,setView]=useState(new Date());
  const y=view.getFullYear(),mo=view.getMonth();
  const firstDay=new Date(y,mo,1).getDay();
  const totalDays=new Date(y,mo+1,0).getDate();
  const dateSet=new Set(deliveries.map(d=>d.deliveryDate));
  const DAY=["일","월","화","수","목","금","토"];
  const cells=[...Array(firstDay).fill(null),...Array.from({length:totalDays},(_,i)=>i+1)];
  const fmt=d=>`${y}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const thisMonth=`${y}-${String(mo+1).padStart(2,"0")}`;
  const monthTotal=deliveries.filter(d=>d.deliveryDate.startsWith(thisMonth)).length;
  const SC=s=>s==="completed"?C.green:s==="inprogress"?C.blue:C.accent;
  const SL=s=>s==="completed"?"완료":s==="inprogress"?"배송중":"대기";
  return (
    <div style={{width:228,flexShrink:0,background:C.card,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",padding:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <button onClick={()=>setView(new Date(y,mo-1,1))} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",padding:4,display:"flex"}}><IcLeft s={15}/></button>
        <span style={{color:C.text,fontSize:13,fontWeight:700}}>{y}년 {mo+1}월</span>
        <button onClick={()=>setView(new Date(y,mo+1,1))} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",padding:4,display:"flex"}}><IcRight s={15}/></button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
        {DAY.map((l,i)=><div key={l} style={{textAlign:"center",fontSize:10,color:i===0?"#f87171":i===6?"#93c5fd":C.muted,padding:"2px 0"}}>{l}</div>)}
        {cells.map((d,i)=>{
          if(!d) return <div key={`e${i}`}/>;
          const ds=fmt(d),hasDel=dateSet.has(ds),isSel=selectedDate===ds,dow=(firstDay+d-1)%7;
          return (
            <button key={d} onClick={()=>onSelect(isSel?null:ds)} style={{background:isSel?C.accent:hasDel?C.border:"transparent",border:`2px solid ${isSel?C.accent:hasDel?C.accent+"55":"transparent"}`,borderRadius:5,color:isSel?"#000":dow===0?"#f87171":dow===6?"#93c5fd":C.text,cursor:"pointer",fontSize:11,padding:"3px 0",position:"relative",fontWeight:hasDel?700:400,lineHeight:"1.5"}}>
              {d}
              {hasDel&&<span style={{position:"absolute",bottom:1,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",background:isSel?"#000":C.accent,display:"block"}}/>}
            </button>
          );
        })}
      </div>
      <button onClick={()=>onSelect(null)} style={{background:C.border2,color:C.muted2,border:"none",borderRadius:5,padding:"5px 0",cursor:"pointer",fontSize:11,marginBottom:12}}>전체 보기</button>
      <div style={{background:C.bg,borderRadius:10,padding:14,flex:1}}>
        <div style={{color:C.muted,fontSize:10,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>이번 달</div>
        <div style={{color:C.accent,fontSize:26,fontWeight:800,lineHeight:1}}>{monthTotal}<span style={{color:C.muted,fontSize:12,fontWeight:400}}> 건</span></div>
        <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:5}}>
          {["pending","inprogress","completed"].map(s=>{
            const cnt=deliveries.filter(d=>d.deliveryDate.startsWith(thisMonth)&&d.status===s).length;
            return cnt>0?<div key={s} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted2}}><span style={{width:6,height:6,borderRadius:"50%",background:SC(s),display:"inline-block"}}/>{SL(s)}</span><span style={{color:SC(s),fontWeight:700,fontSize:12}}>{cnt}</span></div>:null;
          })}
        </div>
      </div>
    </div>
  );
}

    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=320,scale=Math.min(MAX/img.width,MAX/img.height,1);
        const canvas=document.createElement("canvas");
        canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        s("productImage",canvas.toDataURL("image/jpeg",0.75));

      img.src=ev.target.result;
    };
    reader.readAsDataURL(file); e.target.value="";

// ── DeliveryPage ───────────────────────────────────────────────────────────
function DeliveryPage() {
  const {deliveries,addDelivery,updateDelivery,bulkDeleteDeliveries,reorderDeliveries,delLoading,fontSize}=useContext(AppCtx);
  const [selDate,setSelDate]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [editDel,setEditDel]=useState(null);
  const [printDel,setPrintDel]=useState(null);
  const [checked,setChecked]=useState(new Set());
  const [search,setSearch]=useState("");
  const [previewImg,setPreviewImg]=useState(null);
  const dragFrom=useRef(null),dragTo=useRef(null);
  const base=selDate?deliveries.filter(d=>d.deliveryDate===selDate):deliveries;
  const list=search?base.filter(d=>d.customerName.includes(search)||d.address.includes(search)||d.store.includes(search)||d.items.includes(search)):base;
  const save=async form=>{if(editDel)await updateDelivery(editDel.id,form);else await addDelivery(form);setShowAdd(false);setEditDel(null);};
  const bulkDelete=async()=>{await bulkDeleteDeliveries(checked);setChecked(new Set());};
  const toggle=id=>setChecked(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleAll=()=>setChecked(checked.size===list.length&&list.length>0?new Set():new Set(list.map(d=>d.id)));
  const onDragStart=(e,id)=>{dragFrom.current=id;e.dataTransfer.effectAllowed="move";};
  const onDragOver=(e,id)=>{e.preventDefault();dragTo.current=id;};
  const onDrop=async e=>{
    e.preventDefault();
    if(!dragFrom.current||dragFrom.current===dragTo.current) return;
    const arr=[...deliveries];
    const fi=arr.findIndex(d=>d.id===dragFrom.current),ti=arr.findIndex(d=>d.id===dragTo.current);
    const [moved]=arr.splice(fi,1);arr.splice(ti,0,moved);
    await reorderDeliveries(arr);
    dragFrom.current=null;dragTo.current=null;
  };
  const SC=s=>s==="completed"?C.green:s==="inprogress"?C.blue:C.accent;
  const TH={padding:"12px 13px",textAlign:"left",color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:`2px solid ${C.border}`,whiteSpace:"nowrap",background:C.bg,position:"sticky",top:0};
  const TD={padding:"14px 12px",color:C.text,verticalAlign:"middle",borderBottom:`1px solid ${C.border}44`};
  return (
    <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
      <CalendarSidebar selectedDate={selDate} onSelect={setSelDate} deliveries={deliveries}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"9px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:C.card,flexShrink:0,gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
            <span style={{color:C.muted2,fontSize:12,whiteSpace:"nowrap"}}>{selDate?`📅 ${selDate}`:"📋 전체"} <span style={{color:C.accent,fontWeight:700}}>{list.length}건</span></span>
            <div style={{position:"relative",maxWidth:220,flex:1}}>
              <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:C.muted,pointerEvents:"none",display:"flex"}}><IcSearch s={13}/></span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색..." style={{width:"100%",background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,color:C.text,padding:"6px 8px 6px 26px",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
            </div>
            {checked.size>0&&<button onClick={bulkDelete} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 11px",background:"#3a1010",color:C.red,border:`1px solid ${C.red}44`,borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}><IcTrash s={13}/> {checked.size}개 삭제</button>}
          </div>
          <button onClick={()=>{setEditDel(null);setShowAdd(true);}} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",background:C.accent,color:"#000",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}><IcPlus s={15}/> 일정 추가</button>
        </div>
        <div style={{flex:1,overflow:"auto"}}>
          {delLoading?(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:200,color:C.muted,fontSize:14}}>
              <span style={{display:"inline-block",animation:"spin 1s linear infinite",marginRight:8}}><IcRefr s={18}/></span> Firebase에서 불러오는 중...
            </div>
          ):(
            <table style={{width:"100%",borderCollapse:"collapse",fontSize}}>
              <thead><tr>
                <th style={{...TH,width:34}}><input type="checkbox" checked={checked.size===list.length&&list.length>0} onChange={toggleAll} style={{accentColor:C.accent,cursor:"pointer"}}/></th>
                <th style={{...TH,width:46,textAlign:"center"}}>No.</th>
                <th style={TH}>배송일</th><th style={TH}>구입처</th><th style={TH}>고객명</th><th style={TH}>연락처</th>
                <th style={{...TH,width:90,textAlign:"center"}}>사진</th>
                <th style={{...TH,minWidth:150}}>주소</th><th style={TH}>색상</th>
                <th style={{...TH,minWidth:160}}>주문 품목</th><th style={{...TH,minWidth:80}}>기타</th>
                <th style={TH}>상태</th><th style={{...TH,textAlign:"center",minWidth:86}}>관리</th>
              </tr></thead>
              <tbody>
                {list.map((d,i)=>(
                  <tr key={d.id} draggable onDragStart={e=>onDragStart(e,d.id)} onDragOver={e=>onDragOver(e,d.id)} onDrop={onDrop}
                    style={{background:checked.has(d.id)?"#1d4ed833":d.rowColor||C.card,cursor:"grab"}}>
                    <td style={TD}><input type="checkbox" checked={checked.has(d.id)} onChange={()=>toggle(d.id)} style={{accentColor:C.accent,cursor:"pointer",width:15,height:15}}/></td>
                    <td style={{...TD,textAlign:"center"}}><div style={{width:30,height:30,borderRadius:5,background:C.border2,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",color:C.text,fontWeight:800,fontSize:13}}>{i+1}</div></td>
                    <td style={{...TD,color:C.accent2,fontWeight:700,whiteSpace:"nowrap",fontSize:"1.02em"}}>{d.deliveryDate}</td>
                    <td style={{...TD,fontSize:"0.95em",whiteSpace:"nowrap"}}>{d.store||"—"}</td>
                    <td style={{...TD,fontWeight:800,whiteSpace:"nowrap",fontSize:"1.05em"}}>{d.customerName}</td>
                    <td style={{...TD,color:"#93c5fd",fontFamily:"monospace",fontSize:"0.95em",whiteSpace:"nowrap"}}>{d.phone||"—"}</td>
                    <td style={{...TD,textAlign:"center",padding:"10px 8px"}}>
                      {d.productImage?(
                        <img src={d.productImage} alt="제품사진" style={{width:96,height:96,objectFit:"cover",borderRadius:8,border:`2px solid ${C.border2}`,display:"block",margin:"0 auto",cursor:"zoom-in"}} onClick={()=>setPreviewImg(d)} title="클릭하면 크게 보기"/>
                      ):(
                        <div style={{width:96,height:96,borderRadius:8,border:`2px dashed ${C.border2}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",color:C.muted,fontSize:26}}>📷</div>
                      )}
                    </td>
                    <td style={{...TD,fontSize:"0.9em",color:"#b0c4d8",maxWidth:190}}>{d.address||"—"}</td>
                    <td style={TD}><span style={{background:C.border,padding:"3px 8px",borderRadius:5,fontSize:"0.9em",whiteSpace:"nowrap"}}>{d.color||"—"}</span></td>
                    <td style={{...TD,fontSize:"0.95em",lineHeight:1.6}}>{d.items||"—"}</td>
                    <td style={{...TD,color:C.muted2,fontSize:"0.9em",maxWidth:120}}>{d.notes||"—"}</td>
                    <td style={TD}><StatusCell delivery={d} updateDelivery={updateDelivery}/></td>
                    <td style={{...TD,textAlign:"center"}}>
                      <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                        <button onClick={()=>{setEditDel(d);setShowAdd(true);}} title="수정" style={{padding:"6px 10px",background:C.border2,color:C.muted2,border:"none",borderRadius:5,cursor:"pointer",display:"flex"}}><IcEdit s={13}/></button>
                        <button onClick={()=>setPrintDel(d)} title="라벨 인쇄" style={{padding:"6px 10px",background:"#0d2744",color:"#60a5fa",border:"none",borderRadius:5,cursor:"pointer",display:"flex"}}><IcPrint s={13}/></button>
                      </div>
                    </td>
                  </tr>
                ))}
                {list.length===0&&!delLoading&&<tr><td colSpan={13} style={{textAlign:"center",padding:56,color:C.muted,fontSize:14}}>{search?"검색 결과가 없습니다.":"배송 일정이 없습니다. '일정 추가' 버튼을 눌러 등록하세요."}</td></tr>}
              </tbody>
            </table>
          )}
        </div>
      </div>
      {showAdd&&<DeliveryModal onClose={()=>{setShowAdd(false);setEditDel(null);}} onSave={save} init={editDel}/>}
      {printDel&&<PrintLabelModal d={printDel} onClose={()=>setPrintDel(null)}/>}
      {previewImg&&<ImagePreviewModal delivery={previewImg} onClose={()=>setPreviewImg(null)}/>}
    </div>
  );
}

// ── ItemsPage ──────────────────────────────────────────────────────────────
function ItemsPage() {
  const {items,addItem,updateItem,removeItem,sets,addSet,updateSet,removeSet,fontSize,fromWarehouse}=useContext(AppCtx);
  const [tab,setTab]=useState("items");
  const [search,setSearch]=useState("");
  const [showItemModal,setShowItemModal]=useState(false);
  const [showSetModal,setShowSetModal]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [editSet,setEditSet]=useState(null);
  const [iForm,setIForm]=useState({name:"",color:"",barcode:"",stock:0});
  const [sForm,setSForm]=useState({name:"",barcode:"",notes:"",components:[]});
  const [compSearch,setCompSearch]=useState("");
  const csvRef=useRef(),setCsvRef=useRef();
  const filteredItems=items.filter(i=>!search||i.name.includes(search)||i.color.includes(search)||i.barcode.includes(search));
  const openEditItem=it=>{setEditItem(it);setIForm({name:it.name,color:it.color,barcode:it.barcode,stock:it.stock});setShowItemModal(true);};
  const openEditSet=st=>{setEditSet(st);setSForm({name:st.name,barcode:st.barcode,notes:st.notes,components:[...st.components]});setShowSetModal(true);};
  const saveItem=async()=>{
    if(!iForm.name) return;
    if(editItem) await updateItem(editItem.id,iForm); else await addItem(iForm);
    setShowItemModal(false);setEditItem(null);setIForm({name:"",color:"",barcode:"",stock:0});
  };
  const saveSet=async()=>{
    if(!sForm.name) return;
    if(editSet) await updateSet(editSet.id,sForm); else await addSet(sForm);
    setShowSetModal(false);setEditSet(null);setSForm({name:"",barcode:"",notes:"",components:[]});setCompSearch("");
  };
  const addComp=item=>{
    const ex=sForm.components.findIndex(c=>c.itemId===item.id);
    if(ex>=0) setSForm(p=>({...p,components:p.components.map((c,i)=>i===ex?{...c,qty:c.qty+1}:c)}));
    else setSForm(p=>({...p,components:[...p.components,{itemId:item.id,name:item.name,color:item.color,barcode:item.barcode,qty:1}]}));
  };
  const changeQty=(ci,delta)=>setSForm(p=>({...p,components:p.components.map((c,i)=>i===ci?{...c,qty:Math.max(1,c.qty+delta)}:c)}));
  const handleCSV=async e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{
      for(const row of ev.target.result.split("\n").slice(1).filter(r=>r.trim())){
        const [n,c,b,s]=row.split(",").map(x=>x.trim().replace(/"/g,""));
        if(n) await addItem({name:n,color:c||"",barcode:b||"",stock:parseInt(s)||0});
      }
    };
    r.readAsText(file);e.target.value="";
  };
  const handleSetCSV=async e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{
      for(const row of ev.target.result.split("\n").slice(1).filter(r=>r.trim())){
        const [n,b,note,comps]=row.split(",").map(x=>x.trim().replace(/"/g,""));
        const components=(comps||"").split(";").filter(Boolean).map(cp=>{const[nm,cl,qt]=cp.split(":");return{name:nm||"",color:cl||"",qty:parseInt(qt)||1};});
        if(n) await addSet({name:n,barcode:b||"",notes:note||"",components});
      }
    };
    r.readAsText(file);e.target.value="";
  };
  const IS={background:C.bg,border:`1px solid ${C.border2}`,borderRadius:6,color:C.text,padding:"7px 10px",fontSize:13,outline:"none",boxSizing:"border-box"};
  const TH={padding:"9px 12px",textAlign:"left",color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap",background:C.bg};
  const TD={padding:"10px 12px",color:C.text,verticalAlign:"middle",borderBottom:`1px solid ${C.border}22`};
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.card,flexShrink:0}}>
        {[["items","📦 품목 관리",items.length],["sets","🧩 세트 관리",sets.length]].map(([key,label,count])=>(
          <button key={key} onClick={()=>setTab(key)} style={{padding:"12px 22px",background:"none",border:"none",borderBottom:tab===key?`3px solid ${C.accent}`:"3px solid transparent",color:tab===key?C.accent:C.muted,cursor:"pointer",fontSize:14,fontWeight:tab===key?700:400,display:"flex",alignItems:"center",gap:7,fontFamily:"inherit"}}>
            {label}<span style={{background:C.border2,color:C.muted2,padding:"1px 8px",borderRadius:10,fontSize:11}}>{count}</span>
          </button>
        ))}
      </div>
      <div style={{flex:1,overflow:"auto",padding:16}}>
        {tab==="items"&&(
          <>
            <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>

// ── 루트 App ───────────────────────────────────────────────────────────────
function App() {
  const [deliveries,setDeliveries]=useState([]);
  const [delLoading,setDelLoading]=useState(true);
  const [items,setItems]=useState(ITEMS_SEED.map(i=>({...i,id:genId()})));
  const [sets,setSets]=useState(SETS_SEED.map(s=>({...s,id:genId()})));
  const [page,setPage]=useState("delivery");
  const [fontSize,setFontSize]=useState(13);
  const [fbStatus,setFbStatus]=useState("connecting");
  const [whStatus,setWhStatus]=useState("connecting");
  const [fromWarehouse,setFromWarehouse]=useState(false);

  // ── Firestore 실시간 리스너 ──────────────────────────────────────────
  useEffect(()=>{
    setDelLoading(true);
    const unsubs=[];

    // 배송 목록
    unsubs.push(
      fsDb.collection('deliveries').orderBy('order','asc').onSnapshot(snap=>{
        const data=snap.docs.map(d=>({order:9999,...d.data(),id:d.id})).sort((a,b)=>a.order-b.order);
        setDeliveries(data);
        setDelLoading(false);
        setFbStatus("connected");
      }, err=>{console.error('deliveries:',err);setFbStatus("error");setDelLoading(false);})
    );

    // 품목 (창고 미연동 시)
    unsubs.push(
      fsDb.collection('items').onSnapshot(snap=>{
        if(!fromWarehouse) setItems(snap.docs.map(d=>({...d.data(),id:d.id})));
      }, console.error)
    );

    // 세트
    unsubs.push(
      fsDb.collection('sets').onSnapshot(snap=>{
        setSets(snap.docs.map(d=>({...d.data(),id:d.id})));
      }, console.error)
    );

    // Realtime Database — 창고 품목 실시간 연동
    const whRef=rtDb.ref(`${WH_WS}/products`);
    whRef.on('value', snap=>{
      const val=snap.val();
      if(!val){setWhStatus("connected");return;}
      const mapped=Object.values(val).filter(p=>p&&p.name).map(p=>({
        id:String(p.id??genId()),name:p.name||"",color:p.color||"#888780",
        barcode:p.barcode||p.sku||"",stock:typeof p.qty==="number"?p.qty:0,
        sku:p.sku||"",unit:p.unit||"",category:p.category||"",
        reorderLevel:p.reorder||0,fromWarehouse:true,
      }));
      setItems(mapped);
      setFromWarehouse(true);
      setWhStatus("connected");
    }, err=>{console.error('RTDB:',err);setWhStatus("error");});

    return()=>{
      unsubs.forEach(u=>u());
      whRef.off();
    };
  },[]); // eslint-disable-line

  // ── 배송 CRUD ─────────────────────────────────────────────────────────
  const addDelivery=useCallback(async form=>{
    await fsDb.collection('deliveries').add({...form,order:deliveries.length+1,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  },[deliveries]);

  const updateDelivery=useCallback(async(id,form)=>{
    await fsDb.collection('deliveries').doc(id).update(form);
  },[]);

  const bulkDeleteDeliveries=useCallback(async ids=>{
    const batch=fsDb.batch();
    ids.forEach(id=>batch.delete(fsDb.collection('deliveries').doc(id)));
    await batch.commit();
  },[]);

  const reorderDeliveries=useCallback(async arr=>{
    const ri=arr.map((d,i)=>({...d,order:i+1}));
    setDeliveries(ri);
    const batch=fsDb.batch();
    ri.forEach(d=>batch.update(fsDb.collection('deliveries').doc(d.id),{order:d.order}));
    await batch.commit();
  },[]);

  // ── 품목 CRUD ─────────────────────────────────────────────────────────
  const addItem    =useCallback(async form=>{await fsDb.collection('items').add(form);},[]);
  const updateItem =useCallback(async(id,form)=>{await fsDb.collection('items').doc(id).update(form);},[]);
  const removeItem =useCallback(async id=>{await fsDb.collection('items').doc(id).delete();},[]);

  // ── 세트 CRUD ─────────────────────────────────────────────────────────
  const addSet    =useCallback(async form=>{await fsDb.collection('sets').add(form);},[]);
  const updateSet =useCallback(async(id,form)=>{await fsDb.collection('sets').doc(id).update(form);},[]);
  const removeSet =useCallback(async id=>{await fsDb.collection('sets').doc(id).delete();},[]);

  const STATUS={
    connecting:{dot:C.accent,label:"연결 중..."},
    connected: {dot:C.green, label:"Firebase 연결됨"},
    error:     {dot:C.red,   label:"연결 오류"},
  };
  const st=STATUS[fbStatus]||STATUS.connecting;

  const ctx={
    deliveries,addDelivery,updateDelivery,bulkDeleteDeliveries,reorderDeliveries,delLoading,
    items,addItem,updateItem,removeItem,
    sets,addSet,updateSet,removeSet,
    fontSize,fbStatus,fromWarehouse,whStatus,
  };

  return (
    <AppCtx.Provider value={ctx}>
      <div style={{display:"flex",flexDirection:"column",height:"100vh",background:C.bg,fontFamily:"'Noto Sans KR','Apple SD Gothic Neo',sans-serif",color:C.text,overflow:"hidden"}}>
        <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",height:54,background:C.card,borderBottom:`1px solid ${C.border}`,flexShrink:0,zIndex:100,gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{width:34,height:34,background:C.accent,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center"}}><IcPkg s={18}/></div>
            <div>
              <div style={{color:C.text,fontWeight:800,fontSize:15,letterSpacing:"-0.02em",lineHeight:1.2}}>가구 배송 관리</div>
              <div style={{color:C.muted,fontSize:9,letterSpacing:"0.06em"}}>FURNITURE DELIVERY SYSTEM</div>
            </div>
          </div>
          <nav style={{display:"flex",gap:3,background:C.bg,borderRadius:8,padding:3,border:`1px solid ${C.border}`}}>
            {[["delivery","📅 배송 일정"],["items","📦 품목 / 세트"]].map(([key,label])=>(
              <button key={key} onClick={()=>setPage(key)} style={{padding:"6px 16px",background:page===key?C.accent:"transparent",color:page===key?"#000":C.muted,border:"none",borderRadius:5,cursor:"pointer",fontWeight:page===key?700:400,fontSize:13,fontFamily:"inherit"}}>{label}</button>
            ))}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:fbStatus==="connected"?"#0d2a1a":fbStatus==="error"?"#3a1010":C.border2,border:`1px solid ${st.dot}44`,borderRadius:6,fontSize:12,fontWeight:600,color:st.dot}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:st.dot,display:"inline-block",animation:fbStatus==="connecting"?"pulse 1s ease-in-out infinite":"none"}}/>{st.label}
            </div>
            {whStatus==="connected"&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:"#0d2a1a",border:`1px solid ${C.green}44`,borderRadius:6,fontSize:12,fontWeight:600,color:C.green}}><span style={{width:7,height:7,borderRadius:"50%",background:C.green,display:"inline-block"}}/>창고 연동됨</div>}
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{color:C.muted,fontSize:10}}>크기</span>
              <button onClick={()=>setFontSize(s=>Math.max(10,s-1))} style={{width:26,height:26,background:C.border2,color:C.text,border:`1px solid ${C.border2}`,borderRadius:5,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><IcZoomO s={13}/></button>
              <span style={{color:C.accent,fontSize:11,minWidth:18,textAlign:"center",fontWeight:700,fontFamily:"monospace"}}>{fontSize}</span>
              <button onClick={()=>setFontSize(s=>Math.min(20,s+1))} style={{width:26,height:26,background:C.border2,color:C.text,border:`1px solid ${C.border2}`,borderRadius:5,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><IcZoomI s={13}/></button>
            </div>
          </div>
        </header>
        <main style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {page==="delivery"?<DeliveryPage/>:<ItemsPage/>}
        </main>
        <div style={{height:24,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 14px",flexShrink:0}}>
          <span style={{color:C.muted,fontSize:9,display:"flex",alignItems:"center",gap:8}}>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:5,height:5,borderRadius:"50%",background:st.dot,display:"inline-block"}}/>{fbStatus==="connected"?"🔥 Firestore 실시간 동기화":"Firebase 연결 중..."}</span>
            {whStatus==="connected"&&<span style={{color:C.green,display:"flex",alignItems:"center",gap:4}}><span style={{width:5,height:5,borderRadius:"50%",background:C.green,display:"inline-block"}}/>🏭 창고 재고 실시간 연동</span>}
          </span>
          <span style={{color:C.muted,fontSize:9}}>가구 배송 관리 시스템 v3.0 | 행 드래그로 순서 변경</span>
        </div>
      </div>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
